<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Learn KSU · Summer 2026</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
  <div id="layout">
    <aside id="sidebar">
      <div class="sidebar-top">
        <div class="brand">Learn KSU</div>
        <div class="progress-wrap">
          <div class="progress-bg">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="progress-label" id="progressLabel">0% complete</span>
        </div>
      </div>
      <nav id="moduleList"></nav>
      <div id="authBox" class="auth-box"></div>
    </aside>
    <main id="main">
      <div id="lesson"></div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- ✏️  CUSTOMIZE: add more language modules for highlight.js if your course needs them -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/xml.min.js"></script>

  <!-- Firebase (compat) — required for Google sign-in + cloud progress sync -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script src="firebase-config.js"></script>
  <script src="curriculum.js"></script>
  <script src="app.js"></script>
</body>
</html>
